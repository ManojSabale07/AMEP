<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMEP - AI Learning Platform</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="app" class="app">
        <!-- Login Page -->
        <div id="login-page" class="page login-page active">
            <div class="login-container">
                <div class="login-card">
                    <div class="login-header">
                        <span class="login-icon">🎓</span>
                        <h1>AMEP</h1>
                        <p>Adaptive Mastery & Learning Platform</p>
                    </div>
                    <form id="login-form">
                        <div class="form-group">
                            <label for="login-name">Your Name</label>
                            <input type="text" id="login-name" placeholder="Enter your name" required>
                        </div>
                        <div class="form-group">
                            <label>Select Your Role</label>
                            <div class="role-selector">
                                <label class="role-card">
                                    <input type="radio" name="role" value="student" checked>
                                    <div class="role-content">
                                        <span class="role-icon">📚</span>
                                        <span class="role-title">Student</span>
                                        <span class="role-desc">Get personalized learning guidance</span>
                                    </div>
                                </label>
                                <label class="role-card">
                                    <input type="radio" name="role" value="teacher">
                                    <div class="role-content">
                                        <span class="role-icon">👨‍🏫</span>
                                        <span class="role-title">Teacher</span>
                                        <span class="role-desc">Monitor and guide students</span>
                                    </div>
                                </label>
                            </div>
                        </div>
                        <button type="submit" class="btn-primary">
                            <span>Enter Platform</span>
                            <span class="arrow">→</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Main App (After Login) -->
        <div id="main-app" class="page main-app">
            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <span class="logo-icon">🎓</span>
                    <div class="logo-text">
                        <h2>AMEP</h2>
                        <span id="user-role-display">Student</span>
                    </div>
                </div>

                <nav class="sidebar-nav">
                    <ul id="nav-menu">
                        <!-- Dynamic menu items -->
                    </ul>
                </nav>

                <div class="sidebar-footer">
                    <div class="user-info" id="user-info">
                        <span class="user-avatar">👤</span>
                        <span class="user-name" id="user-name">User</span>
                    </div>
                    <button id="logout-btn" class="btn-logout">
                        <span>Logout</span>
                    </button>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <!-- Header -->
                <header class="content-header">
                    <div class="header-left">
                        <button id="menu-toggle" class="menu-toggle">☰</button>
                        <h1 id="page-title">Dashboard</h1>
                    </div>
                    <div class="header-right">
                        <button id="theme-toggle" class="theme-toggle">
                            <span class="sun-icon">☀️</span>
                            <span class="moon-icon">🌙</span>
                        </button>
                    </div>
                </header>

                <!-- Page Content Container -->
                <div class="content-container" id="content-container">
                    <!-- Dynamic content loaded here -->
                </div>
            </main>
        </div>
    </div>

    <!-- Templates -->
    <template id="student-dashboard-template">
        <div class="dashboard student-dashboard">
            <!-- Input Section -->
            <section class="card input-section">
                <div class="card-header">
                    <h3>📝 Enter Your Data</h3>
                </div>
                <div class="card-body">
                    <form id="prediction-form">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="studytime">Study Time</label>
                                <input type="number" id="studytime" min="1" max="4" required placeholder="1-4">
                                <span class="hint">1=&lt;2h, 2=2-5h, 3=5-10h, 4=&gt;10h</span>
                            </div>
                            <div class="form-group">
                                <label for="failures">Past Failures</label>
                                <input type="number" id="failures" min="0" max="4" required placeholder="0-4">
                            </div>
                            <div class="form-group">
                                <label for="absences">Absences</label>
                                <input type="number" id="absences" min="0" max="93" required placeholder="0-93">
                            </div>
                            <div class="form-group">
                                <label for="G1">G1 (Period 1)</label>
                                <input type="number" id="G1" min="0" max="20" required placeholder="0-20">
                            </div>
                            <div class="form-group">
                                <label for="G2">G2 (Period 2)</label>
                                <input type="number" id="G2" min="0" max="20" required placeholder="0-20">
                            </div>
                        </div>
                        <button type="submit" class="btn-primary" id="analyze-btn">
                            <span class="btn-text">🔮 Analyze My Performance</span>
                            <span class="loader hidden"></span>
                        </button>
                    </form>
                    <div id="error-message" class="error hidden"></div>
                </div>
            </section>

            <!-- Results Section -->
            <div id="student-results" class="results-section hidden">
                <!-- Stats Cards -->
                <div class="stats-row" id="stats-row"></div>

                <!-- Risk Alert -->
                <div id="risk-alert" class="alert hidden"></div>

                <!-- Main Grid -->
                <div class="dashboard-grid">
                    <!-- Profile Card -->
                    <section class="card" id="profile-card"></section>

                    <!-- Explanation Card -->
                    <section class="card" id="explanation-card"></section>

                    <!-- Recommendation Card -->
                    <section class="card" id="recommendation-card"></section>

                    <!-- Learning Path Card -->
                    <section class="card" id="learning-path-card"></section>
                </div>

                <!-- Chart -->
                <section class="card chart-section">
                    <div class="card-header">
                        <h3>📈 Score Comparison</h3>
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="score-chart"></canvas>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </template>

    <template id="teacher-dashboard-template">
        <div class="dashboard teacher-dashboard">
            <!-- Class Overview -->
            <section class="class-overview" id="class-overview">
                <div class="overview-card">
                    <span class="overview-icon">👥</span>
                    <div class="overview-content">
                        <span class="overview-value" id="total-students">0</span>
                        <span class="overview-label">Total Students</span>
                    </div>
                </div>
                <div class="overview-card">
                    <span class="overview-icon">📊</span>
                    <div class="overview-content">
                        <span class="overview-value" id="avg-score">0</span>
                        <span class="overview-label">Average Score</span>
                    </div>
                </div>
                <div class="overview-card warning">
                    <span class="overview-icon">⚠️</span>
                    <div class="overview-content">
                        <span class="overview-value" id="at-risk-count">0</span>
                        <span class="overview-label">At-Risk Students</span>
                    </div>
                </div>
                <div class="overview-card success">
                    <span class="overview-icon">✅</span>
                    <div class="overview-content">
                        <span class="overview-value" id="mastery-rate">0%</span>
                        <span class="overview-label">Mastery Rate</span>
                    </div>
                </div>
            </section>

            <!-- Main Teacher Grid -->
            <div class="teacher-grid">
                <!-- Student List -->
                <section class="card students-list-card">
                    <div class="card-header">
                        <h3>📋 Student List</h3>
                        <button id="add-student-btn" class="btn-small">+ Add Student</button>
                    </div>
                    <div class="card-body">
                        <div class="table-container">
                            <table class="students-table" id="students-table">
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Predicted</th>
                                        <th>Mastery</th>
                                        <th>Risk</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="students-tbody">
                                    <!-- Dynamic rows -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </section>

                <!-- Teacher Recommendations -->
                <section class="card recommendations-card">
                    <div class="card-header">
                        <h3>💡 Teacher Recommendations</h3>
                    </div>
                    <div class="card-body" id="teacher-recommendations">
                        <!-- Dynamic content -->
                    </div>
                </section>
            </div>

            <!-- Charts Row -->
            <div class="charts-row">
                <section class="card">
                    <div class="card-header">
                        <h3>📊 Risk Distribution</h3>
                    </div>
                    <div class="card-body">
                        <canvas id="risk-chart"></canvas>
                    </div>
                </section>
                <section class="card">
                    <div class="card-header">
                        <h3>📈 Score Distribution</h3>
                    </div>
                    <div class="card-body">
                        <canvas id="distribution-chart"></canvas>
                    </div>
                </section>
            </div>

            <!-- At-Risk Students -->
            <section class="card at-risk-card">
                <div class="card-header">
                    <h3>🚨 Students Needing Attention</h3>
                </div>
                <div class="card-body" id="at-risk-list">
                    <!-- Dynamic content -->
                </div>
            </section>
        </div>
    </template>

    <!-- Student Detail Modal -->
    <div id="student-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-student-name">Student Details</h3>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>

    <!-- Add Student Modal -->
    <div id="add-student-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add New Student</h3>
                <button class="modal-close" id="add-modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="add-student-form">
                    <div class="form-group">
                        <label for="new-name">Name</label>
                        <input type="text" id="new-name" required placeholder="Student name">
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="new-studytime">Study Time</label>
                            <input type="number" id="new-studytime" min="1" max="4" value="2">
                        </div>
                        <div class="form-group">
                            <label for="new-failures">Failures</label>
                            <input type="number" id="new-failures" min="0" max="4" value="0">
                        </div>
                        <div class="form-group">
                            <label for="new-absences">Absences</label>
                            <input type="number" id="new-absences" min="0" max="93" value="0">
                        </div>
                        <div class="form-group">
                            <label for="new-G1">G1</label>
                            <input type="number" id="new-G1" min="0" max="20" value="10">
                        </div>
                        <div class="form-group">
                            <label for="new-G2">G2</label>
                            <input type="number" id="new-G2" min="0" max="20" value="10">
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">Add Student</button>
                </form>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
